<!DOCTYPE html>
<html>
    <head>
        <title>
            Unit Converter
        </title>
        <link href="style.css" rel="stylesheet">
    </head>
    <body>
        <h1>Unit Converter</h1>
        <h3>Units </h3>
        <div>
        <p>Meter To Kilometer</p>
        <input type="text" placeholder="Enter Value To Convert" id="M_KM">
        <button onclick="Conv_M_TO_KM()">Convert</button>

        <p id="output1"></p>

        <p>Kilometer To Meter</p>
        <input type="text" placeholder="Enter Value To Convert" id="KM_M">
        <button onclick="Conv_KM_TO_M()">Convert</button>

        <p id="output2"></p>
       </div>
       <div>
        <p>Centimeter To Meter</p>
        <input type="text" placeholder="Enter Value To Convert" id="CM_M">
        <button onClick="Conv_CM_TO_M()">Convert</button>

        <p id="output3"></p>

        <p>Meter To Centimeter</p>
        <input type="text" placeholder="Enter Value To Convert" id="M_CM">
        <button onClick="Conv_M_TO_CM()">Convert</button>

        <p id="output4"></p>

       </div>
       <div>
        <p>Centimeter To Kilometer</p>
        <input type="text" placeholder="Enter Value To Convert" id="CM_KM">
        <button onclick="Conv_CM_TO_KM()">Convert</button>

        <p id="output5"></p>

        <p>Kilometer To Centimeter</p>
        <input type="text" placeholder="Enter Value To Convert" id="KM_CM">
        <button onclick="Conv_KM_TO_CM()">Convert</button>

        <p id="output6"></p>
       </div>
    <script src="script.js"></script>
    </body>
</html>
